services:

  redis:
    image: redis:7-alpine
    container_name: kotizo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  evolution:
    image: atendai/evolution-api:latest
    container_name: kotizo_evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=kotizo-evolution-key-2026
      - STORE_MESSAGES=true
      - STORE_MESSAGE_UP=true
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=http://host.docker.internal:8000/api/whatsapp/webhook/
      - DATABASE_ENABLED=false
      - DATABASE_SAVE_DATA_INSTANCE=false
      - DATABASE_SAVE_DATA_NEW_MESSAGE=false
      - DATABASE_SAVE_MESSAGE_UPDATE=false
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_CHATS=false
      - REDIS_ENABLED=true
      - REDIS_URI=redis://kotizo_redis:6379
      - REDIS_PREFIX_KEY=evolution
      - DEL_INSTANCE=false
      - LOG_LEVEL=ERROR
      - LOG_COLOR=true
    depends_on:
      - redis
    volumes:
      - evolution_data:/evolution/instances

volumes:
  redis_data:
  evolution_data: